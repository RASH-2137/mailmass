services:

  db:
    restart: unless-stopped
    image: postgres:16
    container_name: email_platform_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    image: redis:7
    container_name: email_platform_redis
    ports:
      - "6379:6379"

  api:
    restart: unless-stopped
    build: .
    container_name: email_platform_api
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env

  celery_worker:
    restart: unless-stopped
    build: .
    container_name: email_platform_worker
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
  
  celery_beat:
    restart: unless-stopped
    build: .
    container_name: email_platform_beat
    depends_on:
      - db
      - redis
    env_file:
      - .env
    command: celery -A app.celery_worker.celery_app beat --loglevel=info

volumes:
  postgres_data: